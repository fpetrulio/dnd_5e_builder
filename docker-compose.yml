services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dnd_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data          # SQLite persistence
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/docs"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dnd_frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db_data:
